# GraphQL Schema for CRM Application

type Customer {
  id: ID!
  name: String!
  email: String!
  phone: String
  company: String
  contacts: [Contact!]!
  deals: [Deal!]!
}

type Contact {
  id: ID!
  name: String!
  email: String
  phone: String
  title: String
  isPrimary: Boolean!
  customer: Customer!
}

type Deal {
  id: ID!
  title: String!
  value: Float
  status: String
  closeDate: String
  customer: Customer!
}

type Query {
  hello(name: String): String
  customers: [Customer!]!
  customer(id: ID!): Customer
  contacts: [Contact!]!
  deals: [Deal!]!
}

type Mutation {
  createCustomer(name: String!, email: String!, phone: String, company: String): Customer!
  updateCustomer(id: ID!, name: String, email: String, phone: String, company: String): Customer!
  deleteCustomer(id: ID!): Boolean!
}

type Subscription {
  customerAdded: Customer!
  contactAdded: Contact!
}

schema {
  query: Query
  mutation: Mutation
  subscription: Subscription
}
